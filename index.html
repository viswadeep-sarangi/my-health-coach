<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Health Coach</title>
<style>
body { font-family: Arial; margin: 0; background: #f4f6f8; }
.container { padding: 16px; }
.card { background: white; padding: 16px; margin-bottom: 12px; border-radius: 12px; }
h2 { margin-top: 0; }
button { padding: 10px; border-radius: 8px; border: none; background: #4CAF50; color: white; }
input { padding: 8px; width: 100%; margin-bottom: 10px; }
.nav { display: flex; position: fixed; bottom: 0; width: 100%; background: white; border-top: 1px solid #ccc; }
.nav button { flex: 1; padding: 12px; background: none; color: black; }
.hidden { display: none; }
</style>
</head>
<body>

<div id="onboarding" class="container">
  <h2>Welcome</h2>
  <input id="name" placeholder="Your name">
  <button onclick="saveUser()">Start</button>
</div>

<div id="app" class="hidden">
  <div id="plan" class="container">
    <h2>Plan (Week 1)</h2>
    <div class="card">
      <b>Breakfast</b><br>
      Whey (30g)<br>
      2 Eggs + 1 Egg White
    </div>
    <div class="card">
      <b>Lunch</b><br>
      Rice (100g)<br>
      Chicken (150g)<br>
      Veg (150g)
    </div>
    <div class="card">
      <b>Snack</b><br>
      Makhana (20g)
    </div>
    <div class="card">
      <b>Dinner</b><br>
      Poha (150g)<br>
      Egg / Chicken
    </div>
  </div>

  <div id="today" class="container hidden">
    <h2>Today</h2>
    <div class="card">
      <label><input type="checkbox"> Whey</label><br>
      <label><input type="checkbox"> Eggs</label>
    </div>
  </div>

  <div id="weekly" class="container hidden">
    <h2>Weekly</h2>
    <div class="card">
      ⭐⭐⭐⭐ Good week
    </div>
  </div>

  <div class="nav">
    <button onclick="show('plan')">Plan</button>
    <button onclick="show('today')">Today</button>
    <button onclick="show('weekly')">Weekly</button>
  </div>
</div>

<script>
function saveUser(){
  localStorage.setItem('user', document.getElementById('name').value);
  document.getElementById('onboarding').classList.add('hidden');
  document.getElementById('app').classList.remove('hidden');
}

function show(tab){
  ['plan','today','weekly'].forEach(t => {
    document.getElementById(t).classList.add('hidden');
  });
  document.getElementById(tab).classList.remove('hidden');
}

window.onload = () => {
  if(localStorage.getItem('user')){
    document.getElementById('onboarding').classList.add('hidden');
    document.getElementById('app').classList.remove('hidden');
  }
}
</script>

</body>
</html>
